<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQTalker 智能日志分析器</title>
    
    <!-- 核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/log-analyzer-assets/styles/tokens.css">
    <link rel="stylesheet" href="/log-analyzer-assets/styles/main.css">
</head>
<body>
    <!-- 粒子背景画布 -->
    <canvas id="particles-canvas"></canvas>

    <!-- 加载遮罩 -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在分析日志数据</div>
            <div class="loading-subtext">请稍候，正在为您生成智能洞察...</div>
        </div>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo">
                <i class="fas fa-robot"></i> QQTalker Analytics
            </div>
            <div class="navbar-actions">
                <button class="btn btn-secondary" onclick="scrollToSection('analysis')">
                    <i class="fas fa-chart-line"></i> 分析报告
                </button>
                <button class="btn btn-secondary" onclick="scrollToSection('logs')">
                    <i class="fas fa-file-alt"></i> 日志详情
                </button>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 英雄区域 -->
        <section class="hero-section">
            <div class="floating-shapes">
                <div class="shape"></div>
                <div class="shape"></div>
                <div class="shape"></div>
            </div>
            
            <div class="hero-content">
                <h1 class="hero-title">智能日志分析器</h1>
                <p class="hero-subtitle">
                    通过先进的数据可视化技术，深度洞察您的QQTalker机器人运行状态。<br>
                    实时监控、智能分析、性能优化，一切尽在掌握。
                </p>
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="startAnalysis()">
                        <i class="fas fa-rocket"></i> 开始分析
                    </button>
                    <button class="btn btn-secondary" onclick="showDemo()">
                        <i class="fas fa-play-circle"></i> 查看演示
                    </button>
                </div>
            </div>
        </section>

    <script src="/log-analyzer-assets/scripts/app.js"></script>
</body>
</html>
